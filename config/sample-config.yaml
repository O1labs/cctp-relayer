  solana:
    domain: 5
    rpc: "https://api.mainnet-beta.solana.com"
    ws: ""
    message-transmitter: "CCTPV2Sm4AdWt5296sk4P66VBZ7bEhcARwFaaS9YPbeC"
    token-messenger-minter: "CCTPV2vPZJS2u2BBsUoscuikbYjnpFmbFsvVuJdgUMQe"
    start-block: 0
    lookback-period: 100
    broadcast-retries: 5
    broadcast-retry-interval: 10
    min-mint-amount: 10000000
    metrics-denom: "SOL"
    metrics-exponent: 9
    minter-private-key: ""

# Source domain → destination domains
enabled-routes:
  0: [4, 5]
  1: [4]
  2: [4]
  3: [4]
  4: [0, 1, 2, 3, 5]

circle:
  attestation-base-url: "https://iris-api-sandbox.circle.com/attestations/"
  api-version: "v1"
  fetch-retries: 30
  fetch-retry-interval: 3
  enable-fast-transfer-monitoring: false
  reattest-max-retries: 3
  expiration-buffer-blocks: 100
  allowance-monitor-token: "USDC"
  allowance-monitor-interval: 30

destination-caller-only: false

filters:
  - name: "depositor-whitelist"
    enabled: true
    config:
      provider: "quicknode-kv"
      provider_config:
        api_key: ""
      kv_key: "cctp-depositor-whitelist"
      refresh_interval: 300

processor-worker-count: 16