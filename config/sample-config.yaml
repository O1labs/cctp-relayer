    domain: 3
    rpc: ""
    ws: ""
    message-transmitter: "0xC30362313FBBA5cf9163F0bb16a0e01f01A896ca"
    start-block: 0
    lookback-period: 0
    broadcast-retries: 5
    broadcast-retry-interval: 10
