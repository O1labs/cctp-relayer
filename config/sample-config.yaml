    metrics-denom: "ETH"
    metrics-exponent: 18
    minter-private-key: ""

  avalanche:
    chain-id: 43114
    domain: 1
    rpc: ""
    ws: ""
    message-transmitter: "0x8186359af5f57fbb40c6b14a588d2a59c0c29880"
    start-block: 0
    lookback-period: 600
    broadcast-retries: 5
    broadcast-retry-interval: 10
