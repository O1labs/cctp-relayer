chains:
  noble:
    rpc: ""
    chain-id: "grand-1"
    start-block: 0
    lookback-period: 5
    workers: 8
    tx-memo: "Relayed by Strangelove"
    gas-limit: 200000
    broadcast-retries: 5
    broadcast-retry-interval: 5
    block-queue-channel-size: 1000000
    min-mint-amount: 0
    minter-private-key: ""

  ethereum:
    chain-id: 5
    domain: 0
    rpc: ""
    ws: ""
    message-transmitter: "0x26413e8157CD32011E726065a5462e97dD4d03D9"
    start-block: 0
    lookback-period: 5
    broadcast-retries: 5
    broadcast-retry-interval: 10
    min-mint-amount: 10000000
    metrics-denom: "ETH"
    metrics-exponent: 18
    minter-private-key: ""

  optimism:
    chain-id: 10
    domain: 2
    rpc: ""
    ws: ""
    message-transmitter: "0x4d41f22c5a0e5c74090899e5a8fb597a8842b3e8"
    start-block: 0
    lookback-period: 0
    broadcast-retries: 5
    broadcast-retry-interval: 10
    min-mint-amount: 10000000
    metrics-denom: "ETH"
    metrics-exponent: 18
    minter-private-key: ""

  arbitrum:
